version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: devin
      POSTGRES_PASSWORD: devin
      POSTGRES_DB: devin_orchestrator
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init_db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devin -d devin_orchestrator"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://devin:devin@postgres:5432/devin_orchestrator
      DATABASE_URL_RO: postgresql+asyncpg://analytics_ro:analytics_ro_pass@postgres:5432/devin_orchestrator
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app:ro
    restart: unless-stopped

  worker:
    build: .
    command: python -m app.worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://devin:devin@postgres:5432/devin_orchestrator
      DATABASE_URL_RO: postgresql+asyncpg://analytics_ro:analytics_ro_pass@postgres:5432/devin_orchestrator
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - ./app:/app/app:ro
    restart: unless-stopped

volumes:
  postgres_data:
